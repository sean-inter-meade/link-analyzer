# URL type classification patterns.
# Each rule is evaluated top-to-bottom; the first match wins.
# Fields:
#   url_type   – the UrlType enum value to assign
#   hostnames  – list of hostname substrings to match (OR)
#   paths      – list of path substrings to match (OR)
#   notes      – human-readable explanation
#
# Intercom app hostnames cover all regions:
#   US: app.intercom.com / app.intercom.io
#   EU: app.eu.intercom.com / app.eu.intercom.io
#   AU: app.au.intercom.com / app.au.intercom.io
# Using "app." + "intercom.com" as separate entries catches all three.

# Shared hostname anchor used by all Intercom app rules.
# Every rule below that targets the Intercom app UI uses _intercom_app_hosts.
_intercom_app_hosts: &intercom_app
  - intercom.com
  - intercom.io

rules:
  # Excluded — overview/dashboard/index pages with no specific resource
  - url_type: excluded
    hostnames: *intercom_app
    paths:
      - /workflows-overview
      - /automation/overview
      - /automation/workflows-overview
      - /reports/overview
      - /operator/overview
      - /outbound/overview
      - /settings/general
      - /home
    notes: >
      Overview and dashboard pages that are not specific to a resource.
      Also matches standalone=1 overview links.

  - url_type: conversation
    hostnames: *intercom_app
    paths:
      - /conversations/
      - /conversation/
    notes: Intercom conversation URLs

  - url_type: workflow
    hostnames: *intercom_app
    paths:
      - /workflows/
      - /workflow/
      - /operator/workflows
    notes: Intercom workflow builder URLs

  - url_type: procedure
    hostnames: *intercom_app
    paths:
      - /procedures/
      - /fin_procedures
      - /fin-ai-agent/procedures
    notes: Fin AI agent procedure URLs

  - url_type: guidance
    hostnames: *intercom_app
    paths:
      - /guidance/
      - /fin-ai-agent/guidance
    notes: Fin AI agent guidance URLs

  - url_type: custom_action
    hostnames: *intercom_app
    paths:
      - /custom-action
      - /custom_actions/
      - /actions/
      - /platform/actions
    notes: Intercom custom action URLs

  - url_type: knowledge_hub
    hostnames: *intercom_app
    paths:
      - /knowledge-hub/
    notes: Knowledge hub content (folders, external content)

  - url_type: series
    hostnames: *intercom_app
    paths:
      - /outbound/series/
    notes: Outbound series (must be before generic outbound)

  - url_type: outbound
    hostnames: *intercom_app
    paths:
      - /outbound/
    notes: >
      All outbound content types — tours, emails, chats, posts, push,
      checklists, SMS, surveys, carousels, custom-bots, broadcasts,
      tooltips, whatsapp, news items, discord broadcasts.
      These are all rulesets internally.

  - url_type: report
    hostnames: *intercom_app
    paths:
      - /reports/
    notes: Intercom reports and custom reports

  - url_type: user
    hostnames: *intercom_app
    paths:
      - /users/
    notes: Intercom user profile URLs

  - url_type: company
    hostnames: *intercom_app
    paths:
      - /companies/
    notes: Intercom company profile URLs

  - url_type: help_center
    hostnames:
      - help.
      - support.
      - intercom.help
    paths:
      - /articles/
      - /en/articles/
      - /collections/
    notes: Public help center domains and article paths (must be before article rule)

  - url_type: article
    hostnames: *intercom_app
    paths:
      - /articles/
      - /article/
      - /educate/articles
    notes: Intercom articles (internal editor view)

  - url_type: loom
    hostnames:
      - loom.com
      - www.loom.com
    paths: []
    notes: Loom screen recordings

  - url_type: github
    hostnames:
      - github.com
      - www.github.com
    paths: []
    notes: GitHub links (issues, PRs, repos)

  # Fallback – must be last
  - url_type: other
    hostnames: []
    paths: []
    notes: Catch-all for unrecognized URLs
